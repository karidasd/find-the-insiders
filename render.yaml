services:
  - type: web
    name: find-the-insiders
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HELIUS_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
